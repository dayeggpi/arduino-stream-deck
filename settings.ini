# Steam Deck 2 - Keybinding Configuration
#
# Format per button: KEY  or  MOD+KEY  or  MOD+MOD+KEY
#
# Modifiers: CTRL, SHIFT, ALT, GUI (Win key)
#            RCTRL, RSHIFT, RALT, RGUI  (right-side variants)
#
# Special keys: F1-F24, ESC, TAB, ENTER, SPACE, BACKSPACE, DELETE, INSERT
#               HOME, END, PAGE_UP, PAGE_DOWN
#               UP, DOWN, LEFT, RIGHT
#               CAPS_LOCK, PRINT_SCREEN
#
# Regular characters: a-z, 0-9, and symbols use their literal character
# Examples:
#   Button1 = F21
#   Button1 = CTRL+ALT+d
#   Button1 = CTRL+SHIFT+k
#   Button1 = CTRL+z
#   Button1 = SPACE

[Page1]
Button1 = F21
Button2 = F22
Button3 = F23
Button4 = F24

[Page2]
Button1 = F20
Button2 = CTRL+ALT+d
Button3= CTRL+ALT+s
Button4 = CTRL+SHIFT+k

[Page3]
Button1 = F16
Button2 = F17
Button3 = F18
Button4 = F19

[Page4]
